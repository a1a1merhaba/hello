<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin İçin ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffdde1;
    overflow:hidden;
    font-family:Arial;
}

.container{
    text-align:center;
    animation:fadeIn 2s ease;
}

h1{
    color:#ff4d6d;
    font-size:2.5rem;
}

p{
    font-size:1.2rem;
    color:#444;
}

.heart{
    position:absolute;
    color:red;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>
<body>

<div class="container">
    <h1>Seni Seviyorum ❤️</h1>
    <p>Bu küçük sürpriz sadece senin için.</p>
</div>

<script>
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*20 + 20 + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
